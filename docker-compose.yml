services:
  kanban-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kanban-app
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - postgresql
   
  kanban-app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: kanban-app-dev
    working_dir: /app
    ports:
      - "3002:3000"
    volumes:
      - ./:/app
      - kanban_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: true
      CHOKIDAR_USEPOLLING: true
      CHOKIDAR_INTERVAL: 1000
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      - postgresql

  postgresql:
    image: postgres:18-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres_data_vol:/var/lib/postgresql
      - ./postgresql:/docker-entrypoint-initdb.d

volumes:
  postgres_data_vol:
  kanban_node_modules: